version: "3.8" 
services:
  wardrobe-be:
    build:
      context: ./back-end
      dockerfile: Dockerfile
      args:
        MONGO_URI: ${{environment.MONGO_URI}}
        JWT_SECRET: ${{environment.JWT_SECRET}}
        JWT_EXPIRE: ${{environment.JWT_EXPIRE}}
        CLOUDINARY_CLOUD_NAME: ${{environment.CLOUDINARY_CLOUD_NAME}}
        CLOUDINARY_API_KEY: ${{environment.CLOUDINARY_API_KEY}}
        CLOUDINARY_API_SECRET: ${{environment.CLOUDINARY_API_SECRET}}
    container_name: wardrobe-be
    ports:
      - "${{environment.API_PORT}}:${{environment.API_PORT}}"
    env_file:
      - ./back-end/.env
    environment:
      - NODE_ENV=production
    networks:
      - dokploy-network
    restart: unless-stopped

  wardrobe-fe:
    build:
      context: ./front-end
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${{environment.HOST}}:${{environment.API_PORT}}
    container_name: wardrobe-fe
    ports:
      - "${{environment.UI_PORT}}:${{environment.UI_PORT}}"
    depends_on:
      - wardrobe-be
    networks:
      - dokploy-network
    restart: unless-stopped

networks:
  dokploy-network:
    external: true
