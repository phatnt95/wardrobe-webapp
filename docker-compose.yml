version: "3.8" 
services:
  wardrobe-be:
    build:
      context: ./back-end
      dockerfile: Dockerfile
    container_name: wardrobe-be
    ports:
      # Sử dụng cú pháp biến chuẩn của Docker Compose
      - "${API_PORT}:3000" 
    environment:
      - NODE_ENV=production
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRE=${JWT_EXPIRE}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
    networks:
      - dokploy-network
    restart: unless-stopped

  wardrobe-fe:
    build:
      context: ./front-end
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${HOST}:${API_PORT}
    container_name: wardrobe-fe
    ports:
      - "${UI_PORT}:80"
    depends_on:
      - wardrobe-be
    networks:
      - dokploy-network
    restart: unless-stopped

networks:
  dokploy-network:
    external: true
